services:
  redis-server:
    image: redis/redis-stack-server:${STACK_IMAGE_VERSION}
    container_name: $STACK_CONTAINER_NAME
    ports:
      - "${STACK_PORT_IN}:${STACK_PORT_OUT}"
    volumes:
      - ./data:${STACK_VOLUME_LOCATION}
  redis-insight:
    image: redis/redis-stack:${INSIGHT_IMAGE_VERSION}
    container_name: $INSIGHT_CONTAINER_NAME
    ports:
      - "${INSIGHT_PORT_IN}:${INSIGHT_PORT_OUT}"
    volumes:
      - ./data/redisinsight:${INSIGHT_VOLUME_LOCATION}
