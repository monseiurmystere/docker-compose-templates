services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:{$IMAGE_VERSION}
    container_name: $CONTAINER_NAME
    environment:
      SA_PASSWORD: $ADMIN_PASSWORD
      ACCEPT_EULA: Y
    ports:
      - "${PORT_IN}:${PORT_OUT}"
    volumes:
      - ${DATA_LOCATION}:./data
      - ${LOGS_LOCATION}:./log
      - ${SECRETS_LOCATION}:./secrets
